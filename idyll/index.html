<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>IDYLL — A Gallery of Simpler Skies</title>
<meta name="description" content="IDYLL. Idyllic scenes that curve past you like an old screensaver. Scroll.">
<meta name="theme-color" content="#1f4fd8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#fff;--muted:rgba(255,255,255,.8);--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
html{scroll-behavior:auto}
body{background:#1f4fd8;color:var(--ink);font-family:var(--body);font-weight:300;-webkit-font-smoothing:antialiased}
#gl{position:fixed;inset:0;z-index:0;display:block}
.spacer{height:520vh}
.ui{position:fixed;inset:0;z-index:2;pointer-events:none;padding:clamp(20px,3vw,40px) clamp(20px,5vw,56px);display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:.14em}
.nl{display:flex;gap:26px}.nl a{color:var(--muted);text-decoration:none;font-size:14px;pointer-events:auto}
h1{font-family:var(--disp);font-weight:600;font-size:clamp(34px,5.5vw,80px);line-height:.98;letter-spacing:-.02em;text-shadow:0 4px 30px rgba(0,0,40,.3)}
.lead p{margin-top:14px;max-width:40ch;color:var(--muted);font-size:15px}
.hint{font-family:var(--disp);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:center}
@media(max-width:640px){.nl{display:none}}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="ui">
  <div class="top"><div class="brand">IDYLL</div><div class="nl"><a href="#">Scenes</a><a href="#">About</a><a href="#">Save</a></div></div>
  <div class="lead"><h1>Simpler skies,<br>on a loop.</h1><p>A gallery of idyllic scenes that curve past you like a screensaver you forgot you missed. Scroll to drift through.</p></div>
  <div class="hint">Scroll to drift ↓</div>
</div>
<div class="spacer"></div>
<script src="lib/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
