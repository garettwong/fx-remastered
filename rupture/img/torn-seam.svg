      <feColorMatrix in="grain" values=".7 0 0 0 .12  0 .66 0 0 .12  0 0 .58 0 .12  0 0 0 .26 0" result="softGrain"/>
      <feComposite in="softGrain" in2="torn" operator="in" result="grainInside"/>
      <feBlend in="torn" in2="grainInside" mode="multiply"/>
    </filter>
    <filter id="softShadow" x="-120%" y="-5%" width="340%" height="110%">
