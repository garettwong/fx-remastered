<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 1600" preserveAspectRatio="none">
  <defs>
    <linearGradient id="paperTone" x1="0" x2="1">
      <stop offset="0" stop-color="#c9c0b4"/>
      <stop offset=".12" stop-color="#eee8dc"/>
      <stop offset=".42" stop-color="#fffdf7"/>
      <stop offset=".72" stop-color="#f3ede2"/>
      <stop offset="1" stop-color="#aaa198"/>
