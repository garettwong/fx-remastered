<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OLLI — Your Friendly Companion</title>
<meta name="description" content="Meet OLLI. A friendly character that watches your cursor, blinks, and reacts.">
<meta name="theme-color" content="#eafcf3">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#eafcf3;--ink:#173a30;--muted:#5c7a70;--line:#cdeede;--coral:#ff7a66;--mint:#37c98f;--disp:'Baloo 2',cursive;--body:'Inter',sans-serif}
html,body{overflow-x:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:300;-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:0 clamp(20px,5vw,56px)}
nav{display:flex;align-items:center;justify-content:space-between;height:82px}
.brand{font-family:var(--disp);font-weight:800;font-size:24px;color:var(--ink)}
.nl{display:flex;gap:28px}.nl a{color:var(--muted);text-decoration:none;font-size:14px}
.pill{font-family:var(--disp);font-weight:700;font-size:14px;color:#fff;background:var(--mint);border-radius:100px;padding:10px 20px;text-decoration:none}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:center;min-height:calc(100vh - 82px);padding:20px 0 60px}
.eyebrow{font-family:var(--disp);font-weight:700;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--coral);margin-bottom:16px}
h1{font-family:var(--disp);font-weight:800;font-size:clamp(48px,8vw,110px);line-height:.95;letter-spacing:-.01em}
h1 em{font-style:normal;color:var(--mint)}
.sub{margin-top:20px;max-width:40ch;color:var(--muted);font-size:clamp(15px,1.5vw,18px);line-height:1.65}
.row{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
.btn{font-family:var(--disp);font-weight:700;font-size:15px;text-decoration:none;padding:14px 26px;border-radius:100px;transition:transform .3s}
.btn.solid{background:var(--ink);color:#fff}.btn.solid:hover{transform:translateY(-2px)}
.btn.ghost{border:2px solid var(--line);color:var(--ink)}.btn.ghost:hover{border-color:var(--ink)}
.stage{display:flex;align-items:center;justify-content:center}
svg.olli{width:min(440px,84vw);height:auto;cursor:pointer;overflow:visible}
#olli{transform-origin:200px 300px;animation:bob 3.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-14px)}}
.eyeG{transition:transform .09s ease}
.tip{text-align:center;margin-top:10px;color:var(--muted);font-size:13px}
@media(max-width:820px){.hero{grid-template-columns:1fr;text-align:center}.stage{order:-1}.sub,.eyebrow{margin-inline:auto}.row{justify-content:center}.nl{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <nav><div class="brand">OLLI</div><div class="nl"><a href="#">Features</a><a href="#">Story</a><a href="#">Help</a></div><a class="pill" href="#">Get OLLI</a></nav>
  <header class="hero">
    <div>
      <div class="eyebrow">Say hi</div>
      <h1>Meet <em>OLLI.</em></h1>
      <p class="sub">Your cheerful little companion. OLLI watches where you go, blinks now and then, and lights up when you say hello. Give the cursor a wiggle, or tap.</p>
      <div class="row"><a class="btn solid" href="#">Adopt OLLI</a><a class="btn ghost" href="#">See tricks</a></div>
    </div>
    <div class="stage">
      <div>
      <svg class="olli" id="svg" viewBox="0 0 400 400" aria-label="OLLI the mascot">
        <ellipse cx="200" cy="372" rx="90" ry="16" fill="#173a30" opacity=".08"/>
        <g id="olli">
          <path d="M200 60 q-8 -34 -34 -44" stroke="#37c98f" stroke-width="10" fill="none" stroke-linecap="round"/>
          <circle cx="160" cy="16" r="12" fill="#ff7a66"/>
          <rect x="96" y="96" width="208" height="222" rx="98" fill="#37c98f"/>
          <rect x="96" y="96" width="208" height="222" rx="98" fill="url(#sh)"/>
          <ellipse cx="150" cy="250" rx="20" ry="12" fill="#ff9d8a" opacity=".7"/>
          <ellipse cx="250" cy="250" rx="20" ry="12" fill="#ff9d8a" opacity=".7"/>
          <g class="eyeG" id="eyeL"><ellipse cx="158" cy="196" rx="34" ry="38" fill="#fff"/><circle id="pupL" cx="158" cy="200" r="15" fill="#173a30"/><circle cx="152" cy="193" r="5" fill="#fff"/></g>
          <g class="eyeG" id="eyeR"><ellipse cx="242" cy="196" rx="34" ry="38" fill="#fff"/><circle id="pupR" cx="242" cy="200" r="15" fill="#173a30"/><circle cx="236" cy="193" r="5" fill="#fff"/></g>
          <path id="mouth" d="M172 258 q28 26 56 0" stroke="#173a30" stroke-width="9" fill="none" stroke-linecap="round"/>
          <ellipse class="lid" id="lidL" cx="158" cy="196" rx="36" ry="40" fill="#37c98f" style="transform:scaleY(0);transform-origin:158px 196px;transition:transform .1s"/>
          <ellipse class="lid" id="lidR" cx="242" cy="196" rx="36" ry="40" fill="#37c98f" style="transform:scaleY(0);transform-origin:242px 196px;transition:transform .1s"/>
        </g>
        <defs><linearGradient id="sh" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".18"/><stop offset="1" stop-color="#0c5a3f" stop-opacity=".18"/></linearGradient></defs>
      </svg>
      <div class="tip">↑ move your cursor — OLLI is watching</div>
      </div>
    </div>
  </header>
</div>
<script>
const svg=document.getElementById('svg'), pupL=document.getElementById('pupL'), pupR=document.getElementById('pupR'),
      eyeL=document.getElementById('eyeL'), eyeR=document.getElementById('eyeR'), mouth=document.getElementById('mouth'),
      lidL=document.getElementById('lidL'), lidR=document.getElementById('lidR'), olli=document.getElementById('olli');
const EYES=[{p:pupL,g:eyeL,cx:158,cy:196},{p:pupR,g:eyeR,cx:242,cy:196}];
let tx=200,ty=196, cx=200,cy=196;
addEventListener('pointermove',e=>{ const r=svg.getBoundingClientRect(); tx=(e.clientX-r.left)/r.width*400; ty=(e.clientY-r.top)/r.height*400; },{passive:true});
function loop(){ requestAnimationFrame(loop); cx+=(tx-cx)*0.18; cy+=(ty-cy)*0.18;
  EYES.forEach(E=>{ const dx=cx-E.cx, dy=cy-E.cy, d=Math.hypot(dx,dy)||1, m=Math.min(12,d);
    const ox=dx/d*m, oy=dy/d*m; E.p.setAttribute('cx',E.cx+ox); E.p.setAttribute('cy',E.cy+oy);
    E.g.style.transform='translate('+ox*0.25+'px,'+oy*0.25+'px)'; }); }
loop();
/* blink */
function blink(){ lidL.style.transform='scaleY(1)'; lidR.style.transform='scaleY(1)';
  setTimeout(()=>{ lidL.style.transform='scaleY(0)'; lidR.style.transform='scaleY(0)'; },120); }
setInterval(()=>{ blink(); if(Math.random()<0.3) setTimeout(blink,240); }, 3200);
/* react on tap */
let happy=false;
svg.addEventListener('pointerdown',()=>{ mouth.setAttribute('d','M166 254 q34 40 68 0'); olli.style.transform='scale(1.06)'; olli.style.transition='transform .5s cubic-bezier(.34,1.8,.5,1)';
  for(let i=0;i<8;i++){ const s=document.createElementNS('http://www.w3.org/2000/svg','circle'); s.setAttribute('r',5); s.setAttribute('cx',200); s.setAttribute('cy',150); s.setAttribute('fill', i%2?'#ff7a66':'#ffd23f'); olli.appendChild(s);
    const a=(i/8)*6.2832, dist=90; s.animate([{transform:'translate(0,0)',opacity:1},{transform:'translate('+Math.cos(a)*dist+'px,'+Math.sin(a)*dist+'px)',opacity:0}],{duration:700,easing:'ease-out'}).onfinish=()=>s.remove(); }
  setTimeout(()=>{ mouth.setAttribute('d','M172 258 q28 26 56 0'); olli.style.transform='scale(1)'; },600); happy=true; });
window.__olli=()=>({eyes:EYES.length, pupL:[+pupL.getAttribute('cx'),+pupL.getAttribute('cy')], tracked:(cx!==200||cy!==196), reacted:happy});
</script>
</body>
</html>
