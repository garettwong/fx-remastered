<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OLLI — Questions, Answered</title>
<meta name="description" content="Meet OLLI. A friendly mascot that walks your FAQ, blinks, and watches your cursor.">
<meta name="theme-color" content="#fdeede">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fdeede;--ink:#2a2015;--muted:#8a7a63;--line:#efdcc4;--mint:#37c98f;--coral:#ff7a66;--disp:'Baloo 2',cursive;--body:'Inter',sans-serif}
html,body{overflow-x:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-weight:300;-webkit-font-smoothing:antialiased}
.wrap{max-width:1000px;margin:0 auto;padding:0 clamp(20px,5vw,56px)}
nav{display:flex;align-items:center;justify-content:space-between;height:80px}
.brand{font-family:var(--disp);font-weight:800;font-size:24px;color:var(--ink)}
.nl{display:flex;gap:26px}.nl a{color:var(--muted);text-decoration:none;font-size:14px}
.pill{font-family:var(--disp);font-weight:700;font-size:14px;color:#fff;background:var(--mint);border-radius:100px;padding:10px 20px;text-decoration:none}
.hero{text-align:center;padding:40px 0 30px}
.eyebrow{font-family:var(--disp);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;color:var(--coral);margin-bottom:14px}
h1{font-family:var(--disp);font-weight:800;font-size:clamp(38px,6.4vw,76px);line-height:1}
.sub{margin:16px auto 0;max-width:40ch;color:var(--muted);font-size:16px}
.faqsec{position:relative;padding:24px 0 60px}
.faqtitle{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding-bottom:14px}
.faq{border-top:1px solid var(--line);cursor:pointer}
.faq .q{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 4px;font-family:var(--disp);font-weight:600;font-size:clamp(15px,1.7vw,19px)}
.faq .q .chev{transition:transform .3s;color:var(--muted)}
.faq.open .q .chev{transform:rotate(180deg)}
.faq .a{max-height:0;overflow:hidden;transition:max-height .4s ease;color:var(--muted);font-size:14.5px;line-height:1.7}
.faq .a div{padding:0 4px 20px}
.faq:last-child{border-bottom:1px solid var(--line)}
/* mascot */
.mascot{position:absolute;left:0;top:0;width:74px;height:74px;pointer-events:none;z-index:5;transition:top .35s cubic-bezier(.16,1,.3,1)}
.mascot svg{width:100%;height:100%;overflow:visible}
.leg{transform-origin:center top}
.cta{text-align:center;padding:40px 0 90px}
.chevs{display:flex;flex-direction:column;align-items:center;gap:-6px;margin-bottom:14px}
.chevs span{color:var(--coral);font-size:24px;line-height:.7;animation:bounce 1.4s infinite}
.chevs span:nth-child(2){animation-delay:.15s;opacity:.7}.chevs span:nth-child(3){animation-delay:.3s;opacity:.4}
@keyframes bounce{50%{transform:translateY(5px)}}
.cta h2{font-family:var(--disp);font-weight:800;font-size:clamp(28px,4vw,48px)}
.cta .go{display:inline-flex;margin-top:20px;color:#fff;background:var(--ink);font-family:var(--disp);font-weight:700;border-radius:100px;padding:14px 30px;text-decoration:none}
@media(max-width:600px){.nl{display:none}.mascot{width:58px;height:58px}}
</style>
</head>
<body>
<div class="wrap">
  <nav><div class="brand">OLLI</div><div class="nl"><a href="#">Product</a><a href="#">Docs</a><a href="#">Pricing</a></div><a class="pill" href="#">Try OLLI</a></nav>
  <header class="hero">
    <div class="eyebrow">Meet OLLI</div>
    <h1>Questions? OLLI<br>walks you through.</h1>
    <p class="sub">Scroll the FAQ and OLLI strolls along beside you. Blinks now and then. Watches your cursor. Say hi.</p>
  </header>
  <section class="faqsec" id="faqsec">
    <div class="faqtitle">Frequently asked</div>
    <div id="faqlist"></div>
    <div class="mascot" id="mascot">
      <svg viewBox="0 0 80 90" id="svg">
        <line class="leg" id="legL" x1="32" y1="60" x2="30" y2="82" stroke="#e8a24a" stroke-width="5" stroke-linecap="round"/>
        <line class="leg" id="legR" x1="48" y1="60" x2="50" y2="82" stroke="#e8a24a" stroke-width="5" stroke-linecap="round"/>
        <rect x="14" y="12" width="52" height="52" rx="24" fill="#37c98f"/>
        <ellipse cx="28" cy="46" rx="6" ry="4" fill="#ff9d8a" opacity=".7"/><ellipse cx="52" cy="46" rx="6" ry="4" fill="#ff9d8a" opacity=".7"/>
        <g id="eyeL"><ellipse cx="31" cy="36" rx="9" ry="10" fill="#fff"/><circle id="pupL" cx="31" cy="38" r="4" fill="#2a2015"/></g>
        <g id="eyeR"><ellipse cx="49" cy="36" rx="9" ry="10" fill="#fff"/><circle id="pupR" cx="49" cy="38" r="4" fill="#2a2015"/></g>
        <path id="mouth" d="M34 50 q6 6 12 0" stroke="#2a2015" stroke-width="3" fill="none" stroke-linecap="round"/>
        <ellipse class="lid" id="lidL" cx="31" cy="36" rx="10" ry="11" fill="#37c98f" style="transform:scaleY(0);transform-origin:31px 36px;transition:transform .1s"/>
        <ellipse class="lid" id="lidR" cx="49" cy="36" rx="10" ry="11" fill="#37c98f" style="transform:scaleY(0);transform-origin:49px 36px;transition:transform .1s"/>
      </svg>
    </div>
  </section>
  <section class="cta">
    <div class="chevs"><span>﹀</span><span>﹀</span><span>﹀</span></div>
    <h2>Still stuck? OLLI can help.</h2>
    <a class="go" href="#">Try OLLI now →</a>
  </section>
</div>
<script>
const FAQ=[
 ['What exactly is OLLI?','OLLI is a friendly little assistant that lives on your site and helps visitors find answers, fast.'],
 ['How is OLLI billed?','Simple monthly plans based on conversations, not seats. Cancel any time.'],
 ['Can OLLI match my brand?','Yes. Colours, voice and personality are all yours to set in a couple of clicks.'],
 ['Does OLLI need code?','A single snippet. Paste it once and OLLI shows up everywhere.'],
 ['Where does the data live?','In your region, encrypted, and never used to train anyone else’s model.'],
 ['Is there a free trial?','Fourteen days, no card. OLLI walks in and gets to work.'],
 ['Can OLLI talk to my tools?','OLLI connects to your help desk, docs and CRM out of the box.'],
 ['What if I get stuck?','A real human is one message away, and OLLI will fetch them for you.']
];
const list=document.getElementById('faqlist');
list.innerHTML=FAQ.map(f=>`<div class="faq"><div class="q"><span>${f[0]}</span><span class="chev">﹀</span></div><div class="a"><div>${f[1]}</div></div></div>`).join('');
list.querySelectorAll('.faq').forEach(f=>f.addEventListener('click',()=>{ const a=f.querySelector('.a'); const open=f.classList.toggle('open');
  a.style.maxHeight=open?a.scrollHeight+'px':'0'; }));

/* OLLI walks along the FAQ as you scroll */
const mascot=document.getElementById('mascot'), sec=document.getElementById('faqsec'), legL=document.getElementById('legL'), legR=document.getElementById('legR');
let dir=1, walkT=0;
function place(){ const r=sec.getBoundingClientRect(); const vh=innerHeight;
  let p=(vh*0.5 - r.top)/(r.height); p=Math.max(0,Math.min(1,p));   // progress through the FAQ section
  const tri=Math.abs(((p*2)%2)-1);                                   // ping-pong 0..1..0 as you scroll
  const w=sec.clientWidth-84; const x=tri*w;
  dir=(x>=(mascot._lx||0))?1:-1; mascot._lx=x;
  const rows=[...list.querySelectorAll('.faq')];
  const nearest=rows[Math.min(rows.length-1,Math.round(p*(rows.length-1)))];
  const y=nearest? nearest.offsetTop-58 : 0;
  mascot.style.transform='translateX('+x+'px) scaleX('+dir+')';
  mascot.style.top=(list.offsetTop+y)+'px';
}
let ticking=false;
addEventListener('scroll',()=>{ if(!ticking){requestAnimationFrame(()=>{place();ticking=false;});ticking=true;} },{passive:true});
addEventListener('resize',place); place();

/* legs walk cycle + eyes + blink (timer-driven, robust) */
const pupL=document.getElementById('pupL'),pupR=document.getElementById('pupR'),lidL=document.getElementById('lidL'),lidR=document.getElementById('lidR'),svg=document.getElementById('svg');
let mx=40,my=36;
addEventListener('pointermove',e=>{ const r=svg.getBoundingClientRect(); if(r.width){ mx=(e.clientX-r.left)/r.width*80; my=(e.clientY-r.top)/r.height*90; } },{passive:true});
function loop(){ requestAnimationFrame(loop); walkT+=0.15;
  const sw=Math.sin(walkT)*8; legL.setAttribute('x2',30+sw); legR.setAttribute('x2',50-sw);
  [[pupL,31],[pupR,49]].forEach(p=>{ const dx=Math.max(-3,Math.min(3,(mx-p[1])*0.15)), dy=Math.max(-3,Math.min(3,(my-38)*0.1)); p[0].setAttribute('cx',p[1]+dx); p[0].setAttribute('cy',38+dy); });
}
loop();
setInterval(()=>{ lidL.style.transform='scaleY(1)';lidR.style.transform='scaleY(1)'; setTimeout(()=>{lidL.style.transform='scaleY(0)';lidR.style.transform='scaleY(0)';},130); },3000);
window.__olli=()=>({faqs:document.querySelectorAll('.faq').length, mascotX:Math.round(mascot._lx||0), walking:true});
</script>
</body>
</html>
