<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CHROMA — A Studio of Surfaces</title>
<meta name="description" content="CHROMA finishes surfaces. Real-time chrome, glass and matte on tumbling forms.">
<meta name="theme-color" content="#eceae4">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#191a1d;--muted:#6b6c70;--line:rgba(25,26,29,.14);--accent:#1f7a55;--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
html,body{height:100%}
body{background:#eceae4;color:var(--ink);font-family:var(--body);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#gl{position:fixed;inset:0;z-index:0;display:block;cursor:grab}#gl.grab{cursor:grabbing}
.wrap{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,56px);pointer-events:none}
.wrap a,.wrap button{pointer-events:auto}
nav{display:flex;align-items:center;justify-content:space-between;height:84px}
.brand{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.02em}
.nl{display:flex;gap:30px}.nl a{color:var(--muted);text-decoration:none;font-size:14px}.nl a:hover{color:var(--ink)}
.hero{min-height:calc(100vh - 84px);display:flex;flex-direction:column;justify-content:center;max-width:600px;padding:40px 0 120px}
.eyebrow{font-family:var(--disp);font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
h1{font-family:var(--disp);font-weight:600;font-size:clamp(44px,7.4vw,104px);line-height:.95;letter-spacing:-.03em}
.sub{margin-top:24px;max-width:42ch;color:var(--muted);font-size:clamp(15px,1.5vw,18px);line-height:1.7}
.mats{display:flex;gap:10px;margin-top:34px;flex-wrap:wrap}
.mbtn{font-family:var(--disp);font-weight:500;font-size:13.5px;color:var(--ink);background:rgba(255,255,255,.6);border:1px solid var(--line);border-radius:100px;padding:10px 18px;cursor:pointer;transition:.25s;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.mbtn:hover{border-color:var(--ink)}.mbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.hint{position:fixed;right:clamp(20px,5vw,56px);bottom:26px;z-index:3;color:var(--muted);font-family:var(--disp);font-size:12px;letter-spacing:.16em;text-transform:uppercase}
@media(max-width:640px){.nl{display:none}}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="wrap">
  <nav><div class="brand">CHROMA</div><div class="nl"><a href="#">Finishes</a><a href="#">Work</a><a href="#">Studio</a><a href="#">Contact</a></nav>
  <header class="hero">
    <div class="eyebrow">A studio of surfaces</div>
    <h1>Surfaces,<br>in motion.</h1>
    <p class="sub">We finish objects. Chrome, glass, gold, matte. Every form here is real geometry, lit and reflecting in real time. Pick a finish, then drag to turn it in the light.</p>
    <div class="mats" id="mats">
      <button class="mbtn on" data-m="chrome">Chrome</button>
      <button class="mbtn" data-m="gold">Gold</button>
      <button class="mbtn" data-m="glass">Glass</button>
      <button class="mbtn" data-m="matte">Matte</button>
    </div>
  </header>
</div>
<div class="hint">Drag to turn</div>
<script src="lib/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
