<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>EMBER — Where Ideas Catch Fire</title>
<meta name="description" content="EMBER, a creative studio. A wordmark made of living embers. Disturb it.">
<meta name="theme-color" content="#08060a">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#f2ede6;--muted:rgba(242,237,230,.6);--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
html,body{height:100%}
body{background:#08060a;color:var(--ink);font-family:var(--body);font-weight:300;overflow:hidden;-webkit-font-smoothing:antialiased}
@property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
.frame{position:fixed;inset:clamp(10px,1.6vw,22px);z-index:1;border-radius:16px;padding:1.5px;pointer-events:none;
  /* warm ember glow travelling all the way around — every edge stays lit */
  background:
    conic-gradient(from var(--a) at 50% 50%,
      #ff2d6b 0deg, #ff5a2c 55deg, #ffb43c 110deg, #ff7a1e 165deg,
      #5a0f1e 210deg, #2a0a12 250deg, #5a0f1e 290deg, #ff8a2e 330deg, #ff2d6b 360deg);
  filter:drop-shadow(0 0 14px rgba(255,96,40,.22)) drop-shadow(0 0 3px rgba(255,150,60,.35));
  animation:emberSpin 14s linear infinite}
@keyframes emberSpin{to{--a:360deg}}
@media(prefers-reduced-motion:reduce){.frame{animation:none}}
.frame .in{position:absolute;inset:1.5px;border-radius:14.5px;background:#08060a;overflow:hidden}
/* faint inner heat-bloom hugging the border so the edge reads as glowing, not a hard line */
.frame .in::after{content:'';position:absolute;inset:0;border-radius:14.5px;pointer-events:none;
  box-shadow:inset 0 0 34px rgba(255,110,40,.14), inset 0 0 90px rgba(255,60,80,.05)}
#fx{position:absolute;inset:0;width:100%;height:100%;display:block;border-radius:14px;pointer-events:auto}
.ui{position:fixed;inset:0;z-index:3;pointer-events:none;padding:clamp(30px,5vw,60px);display:flex;flex-direction:column;justify-content:space-between}
.top{display:flex;align-items:center;justify-content:space-between}
.brand{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.2em}
.nl{display:flex;gap:24px}.nl a{color:var(--muted);text-decoration:none;font-size:13px;pointer-events:auto}
.bot{max-width:44ch}
.bot .e{font-family:var(--disp);font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#ff7a3c;margin-bottom:12px}
.bot h1{font-family:var(--disp);font-weight:600;font-size:clamp(22px,2.6vw,34px);line-height:1.1}
.bot p{margin-top:12px;color:var(--muted);font-size:14px;line-height:1.6}
.hint{font-family:var(--disp);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:right}
@media(max-width:640px){.nl{display:none}}
</style>
</head>
<body>
<div class="frame"><div class="in"><canvas id="fx"></canvas></div></div>
<div class="ui">
  <div class="top"><div class="brand">EMBER</div><div class="nl"><a href="#">Studio</a><a href="#">Work</a><a href="#">Playful Ground</a></div></div>
  <div class="top" style="align-items:flex-end">
    <div class="bot"><div class="e">Creative studio</div><h1>Where ideas<br>catch fire.</h1><p>The mark below is a few thousand living embers holding a shape. Sweep your cursor through and watch it scatter, then gather again.</p></div>
    <div class="hint">Disturb the embers</div>
  </div>
</div>
<script>
const cv=document.getElementById('fx'), ctx=cv.getContext('2d'); let W=0,H=0,DPR=Math.min(devicePixelRatio||1,1.5);
const mouse={x:-9999,y:-9999};
let parts=[], sparks=[], built=false;
/* pre-render FIRE sprites ONCE (white-hot → yellow → orange → red) + a spark — drawImage, no per-particle gradient */
function grad(stops,size){ const s=document.createElement('canvas'); s.width=s.height=size; const c=s.getContext('2d');
  const g=c.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2); stops.forEach(st=>g.addColorStop(st[0],st[1]));
  c.fillStyle=g; c.fillRect(0,0,size,size); return s; }
const FIRE=[
  grad([[0,'rgba(255,255,245,1)'],[.35,'rgba(255,226,132,.72)'],[1,'rgba(255,150,50,0)']],28),  // white-hot
  grad([[0,'rgba(255,238,176,1)'],[.4,'rgba(255,176,66,.6)'],[1,'rgba(255,96,26,0)']],28),        // yellow
  grad([[0,'rgba(255,182,92,1)'],[.42,'rgba(255,110,42,.55)'],[1,'rgba(200,46,13,0)']],28),        // orange
  grad([[0,'rgba(255,120,70,1)'],[.42,'rgba(226,58,30,.5)'],[1,'rgba(120,22,12,0)']],28)           // red
];
const SPARK=grad([[0,'rgba(255,255,236,1)'],[.5,'rgba(255,186,86,.85)'],[1,'rgba(255,120,40,0)']],14);
function heatSpr(h){ return h>0.72?0:h>0.45?1:h>0.2?2:3; }
function build(){ const cw=cv.clientWidth, ch=cv.clientHeight; if(cw<4||ch<4) return;   // wait for layout
  DPR=Math.min(devicePixelRatio||1,1.5); W=cv.width=Math.round(cw*DPR); H=cv.height=Math.round(ch*DPR);
  const oc=document.createElement('canvas'); oc.width=W; oc.height=H; const o=oc.getContext('2d');
  const fs=Math.min(W*0.24, H*0.5); o.fillStyle='#fff'; o.font='700 '+fs+'px "Space Grotesk", sans-serif'; o.textAlign='center'; o.textBaseline='middle';
  o.fillText('EMBER', W/2, H*0.5);
  const d=o.getImageData(0,0,W,H).data; const step=Math.max(9,Math.round(9*DPR)); const targets=[]; let ymin=H,ymax=0;
  for(let y=0;y<H;y+=step)for(let x=0;x<W;x+=step){ if(d[(y*W+x)*4+3]>128){ targets.push([x,y]); if(y<ymin)ymin=y; if(y>ymax)ymax=y; } }
  const span=Math.max(1,ymax-ymin);
  parts=targets.map(t=>({x:Math.random()*W,y:H+Math.random()*40,tx:t[0],ty:t[1],
    heat:1-(t[1]-ymin)/span, ph:Math.random()*6.28, sp:0.05+Math.random()*0.05}));   // bottom of glyph runs hotter
  built=true;
}
addEventListener('resize',()=>{ built=false; });
if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>{ built=false; });
cv.addEventListener('pointermove',e=>{ const r=cv.getBoundingClientRect(); mouse.x=(e.clientX-r.left)*DPR; mouse.y=(e.clientY-r.top)*DPR; },{passive:true});
cv.addEventListener('pointerleave',()=>{mouse.x=mouse.y=-9999;});
let t=0;
function frame(){ requestAnimationFrame(frame);
  if(!built){ build(); if(!built) return; }
  t+=0.05;
  ctx.globalCompositeOperation='source-over'; ctx.fillStyle='rgba(8,6,10,0.26)'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='lighter'; const r=6.5*DPR;
  for(const p of parts){ let dx=p.tx-p.x, dy=p.ty-p.y; let ignite=0;
    const mdx=p.x-mouse.x, mdy=p.y-mouse.y, md2=mdx*mdx+mdy*mdy, R=120*DPR;
    if(md2<R*R){ const md=Math.sqrt(md2)||1, f=(1-md/R); p.x+=mdx/md*f*4.5; p.y+=mdy/md*f*4.5; ignite=f; }   // hover ignites + nudges
    p.x+=dx*p.sp+Math.sin(t*1.3+p.ph)*0.5*DPR;
    p.y+=dy*p.sp+Math.cos(t*1.1+p.ph)*0.4*DPR - (0.5+0.6*p.heat)*DPR;                 // flame lick up (hotter licks higher)
    const fl=0.55+0.45*Math.sin(t*4+p.ph*2);
    ctx.globalAlpha=fl; ctx.drawImage(FIRE[heatSpr(p.heat*fl)], p.x-r, p.y-r, r*2, r*2);
    if(sparks.length<520 && Math.random()<(0.02+0.55*ignite+0.05*p.heat)){            // emit rising embers
      sparks.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*1.2*DPR,vy:-(1+Math.random()*2.4)*DPR,life:1,dl:0.008+Math.random()*0.012,sz:0.5+Math.random()*0.9}); }
  }
  for(let i=sparks.length-1;i>=0;i--){ const s=sparks[i];                             // rising sparks cool as they age
    s.vy*=0.985; s.vx+=Math.sin(t*2+s.y*0.01)*0.05*DPR; s.x+=s.vx; s.y+=s.vy; s.life-=s.dl;
    if(s.life<=0){ sparks.splice(i,1); continue; }
    ctx.globalAlpha=Math.min(1,s.life*1.4); const sr=(2.5+3*s.life)*s.sz*DPR;
    ctx.drawImage(s.life>0.6?SPARK:FIRE[s.life>0.35?2:3], s.x-sr, s.y-sr, sr*2, sr*2);
  }
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over';
}
frame();
window.__ember=()=>({particles:parts.length, canvas:[cv.width,cv.height], ctx:!!ctx});
</script>
</body>
</html>
