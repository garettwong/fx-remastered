<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SOLACE — A Mountain Retreat</title>
<meta name="description" content="SOLACE, a mountain retreat. A living dawn, rendered in real time.">
<meta name="theme-color" content="#e9c9b0">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#2b2320;--paper:#f3e7db;--muted:rgba(43,35,32,.62);--line:rgba(43,35,32,.16);--accent:#c26b4a;--disp:'Fraunces',serif;--body:'Inter',sans-serif}
html,body{height:100%}
body{background:#e9c9b0;color:var(--ink);font-family:var(--body);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#sky{position:fixed;inset:0;z-index:0;display:block}
.wrap{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,56px)}
nav{display:flex;align-items:center;justify-content:space-between;height:84px}
.brand{font-family:var(--disp);font-weight:400;font-size:22px;letter-spacing:.16em}
.nl{display:flex;gap:30px}.nl a{color:var(--ink);opacity:.7;text-decoration:none;font-size:14px}.nl a:hover{opacity:1}
.tag{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.hero{min-height:calc(100vh - 84px);display:flex;flex-direction:column;justify-content:center;text-align:center;align-items:center;padding:20px 0 120px}
.eyebrow{font-family:var(--body);font-weight:400;font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:26px}
h1{font-family:var(--disp);font-weight:300;font-size:clamp(46px,9vw,132px);line-height:.98;letter-spacing:-.02em}
h1 em{font-style:italic;color:var(--accent)}
.sub{margin-top:26px;max-width:42ch;color:var(--ink);opacity:.72;font-size:clamp(15px,1.5vw,18px);line-height:1.75}
.cta{display:inline-flex;align-items:center;gap:10px;margin-top:34px;color:var(--paper);background:var(--ink);text-decoration:none;font-size:14px;border-radius:100px;padding:14px 28px;transition:transform .3s}
.cta:hover{transform:translateY(-2px)}
@media(max-width:640px){.nl{display:none}}
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="wrap">
  <nav><div class="brand">SOLACE</div><div class="nl"><a href="#">Stay</a><a href="#">Rooms</a><a href="#">Journal</a></div><div class="tag">4:52 AM · Dawn</div></nav>
  <header class="hero">
    <div class="eyebrow">A mountain retreat</div>
    <h1>Breathe<br>it all <em>out.</em></h1>
    <p class="sub">Above the cloud line, where the day begins slowly. This dawn is drawn in real time, layer by layer. Move your cursor and let the mountains lean.</p>
    <a class="cta" href="#">Reserve your quiet →</a>
  </header>
</div>
<script>
const cv=document.getElementById('sky'), ctx=cv.getContext('2d');
let W,H,DPR;
function hash(x){ x=(x<<13)^x; return 1-((x*(x*x*15731+789221)+1376312589)&0x7fffffff)/1073741824; }
function vn(x){ const i=Math.floor(x),f=x-i,u=f*f*(3-2*f); return hash(i)*(1-u)+hash(i+1)*u; }
function fbm(x){ let v=0,a=.5,fr=1; for(let k=0;k<4;k++){ v+=a*vn(x*fr); fr*=2; a*=.5; } return v; }
const LAYERS=[
 {c:'#b79ba8',base:.52,amp:.10,fr:0.9,seed:11,par:6},
 {c:'#9d7f92',base:.60,amp:.13,fr:1.3,seed:40,par:12},
 {c:'#7d6178',base:.69,amp:.16,fr:1.7,seed:73,par:20},
 {c:'#573f55',base:.80,amp:.19,fr:2.2,seed:120,par:32},
 {c:'#331f34',base:.93,amp:.22,fr:2.9,seed:200,par:46}
];
let ridges=[];
function build(){ ridges=LAYERS.map(L=>{ const pts=[]; const n=90;
  for(let i=0;i<=n;i++){ const x=i/n; pts.push(H*L.base - fbm(x*6*L.fr+L.seed)*H*L.amp); } return pts; }); }
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR; cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px'; build(); }
addEventListener('resize',resize); resize();
const mouse={x:0,y:0};
addEventListener('pointermove',e=>{ mouse.x=(e.clientX/innerWidth-0.5); mouse.y=(e.clientY/innerHeight-0.5); },{passive:true});
// petals
const P=Array.from({length:64},()=>({x:Math.random()*W,y:Math.random()*H,s:(2+Math.random()*4)*DPR,vx:(-0.3-Math.random()*0.5)*DPR,sway:Math.random()*6.28,rot:Math.random()*6.28}));
let t=0, mx=0,my=0;
function frame(){ requestAnimationFrame(frame); t+=0.006; mx+=(mouse.x-mx)*0.05; my+=(mouse.y-my)*0.05;
  // sky
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#f7d9b8'); g.addColorStop(.34,'#efc3ae'); g.addColorStop(.6,'#cf9fac'); g.addColorStop(1,'#7d6a86');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // sun glow
  const sx=W*0.5+mx*W*0.04, sy=H*0.42; const sg=ctx.createRadialGradient(sx,sy,0,sx,sy,H*0.5);
  sg.addColorStop(0,'rgba(255,244,224,0.9)'); sg.addColorStop(.15,'rgba(255,226,190,0.55)'); sg.addColorStop(.5,'rgba(255,210,180,0)');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);
  ctx.beginPath(); ctx.arc(sx,sy,H*0.05,0,6.2832); ctx.fillStyle='rgba(255,248,232,0.95)'; ctx.fill();
  // ridges
  for(let li=0;li<LAYERS.length;li++){ const L=LAYERS[li], r=ridges[li], off=mx*L.par*DPR, yoff=my*L.par*0.4*DPR;
    ctx.beginPath(); ctx.moveTo(-off-40,H);
    for(let i=0;i<r.length;i++){ const x=i/(r.length-1)*W; ctx.lineTo(x-off, r[i]+yoff); }
    ctx.lineTo(W+off+40,H); ctx.closePath(); ctx.fillStyle=L.c; ctx.fill();
    // mist above each far ridge
    if(li<3){ ctx.fillStyle='rgba(247,224,210,'+(0.12-li*0.03)+')'; ctx.fillRect(0, H*(LAYERS[li].base)-20*DPR + Math.sin(t+li)*8*DPR, W, 60*DPR); }
  }
  // petals (drift)
  for(const p of P){ p.x+=p.vx; p.y+=Math.sin(t*2+p.sway)*0.3*DPR+0.15*DPR; p.rot+=0.01; p.sway+=0.01;
    if(p.x<-10){ p.x=W+10; p.y=Math.random()*H*0.8; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle='rgba(210,120,90,0.5)';
    ctx.beginPath(); ctx.ellipse(0,0,p.s,p.s*0.5,0,0,6.2832); ctx.fill(); ctx.restore(); }
}
requestAnimationFrame(frame);
window.__solace=()=>({layers:LAYERS.length, ridges:ridges.length, petals:P.length, canvas:[cv.width,cv.height], ctx:!!ctx});
</script>
</body>
</html>
