<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NOCTURNE — The City After Midnight</title>
<meta name="description" content="NOCTURNE. A living noir city, procedurally generated in Three.js. Fly through it.">
<meta name="theme-color" content="#05060a">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#eaecf5;--muted:rgba(234,236,245,.6);--line:rgba(234,236,245,.12);--accent:#e8a04a;--disp:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
html,body{height:100%}
body{background:#05060a;color:var(--ink);font-family:var(--body);font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased}
#gl{position:fixed;inset:0;z-index:0;display:block;cursor:grab}#gl.grab{cursor:grabbing}
.scrim{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(90% 80% at 50% 20%,rgba(5,6,10,0) 45%,rgba(5,6,10,.7) 100%),linear-gradient(180deg,rgba(5,6,10,.5),rgba(5,6,10,0) 30%,rgba(5,6,10,0) 60%,rgba(5,6,10,.85) 100%)}
.wrap{position:relative;z-index:2;max-width:1240px;margin:0 auto;padding:0 clamp(20px,5vw,56px)}
nav{display:flex;align-items:center;justify-content:space-between;height:84px}
.brand{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:.18em}
.nl{display:flex;gap:30px}.nl a{color:var(--muted);text-decoration:none;font-size:14px}.nl a:hover{color:var(--ink)}
.tag{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.hero{min-height:calc(100vh - 84px);display:flex;flex-direction:column;justify-content:center;max-width:600px;padding:40px 0 120px}
.eyebrow{font-family:var(--disp);font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:24px}
h1{font-family:var(--disp);font-weight:500;font-size:clamp(46px,8vw,120px);line-height:.94;letter-spacing:-.03em}
h1 em{font-style:normal;color:var(--accent)}
.sub{margin-top:24px;max-width:44ch;color:var(--muted);font-size:clamp(15px,1.5vw,18px);line-height:1.7}
.cta{display:inline-flex;align-items:center;gap:10px;margin-top:32px;color:#100a04;background:var(--accent);text-decoration:none;font-family:var(--disp);font-weight:600;font-size:14px;border-radius:100px;padding:14px 28px;transition:transform .3s}
.cta:hover{transform:translateY(-2px)}
.hint{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:3;color:var(--muted);font-family:var(--disp);font-size:12px;letter-spacing:.18em;text-transform:uppercase}
@media(max-width:640px){.nl{display:none}}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="scrim"></div>
<div class="wrap">
  <nav><div class="brand">NOCTURNE</div><div class="nl"><a href="#">Places</a><a href="#">Nights</a><a href="#">Guide</a></nav><div class="tag">01:14 · Downtown</div></nav>
  <header class="hero">
    <div class="eyebrow">The city after midnight</div>
    <h1>The city that<br><em>never sleeps.</em></h1>
    <p class="sub">A living skyline, every window generated in real time. Drag to bank over downtown, scroll to fly out to the edge of the lights.</p>
    <a class="cta" href="#">Enter the night →</a>
  </header>
</div>
<div class="hint">Drag to bank · scroll to fly</div>
<script src="lib/three.min.js"></script>
<script src="app.js"></script>
</body>
</html>
